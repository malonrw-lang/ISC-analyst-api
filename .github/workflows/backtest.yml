name: Filter Lab Backtest

# Trigger manually from the Actions tab.
# Setup (one-time): add TIINGO_TOKEN as a repo secret.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit to first N tickers (leave blank for full 503)'
        required: false
        default: ''
      snapshot_date:
        description: 'Snapshot date YYYY-MM-DD'
        required: false
        default: '2026-05-14'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout ISC-analyst-api repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy requests fastapi

      - name: Download snapshot CSV
        run: |
          SNAPSHOT_DATE="${{ github.event.inputs.snapshot_date }}"
          if [ -z "$SNAPSHOT_DATE" ]; then
            SNAPSHOT_DATE="2026-05-14"
          fi
          echo "Using snapshot date: $SNAPSHOT_DATE"
          curl -fL -o snapshot.csv "https://raw.githubusercontent.com/malonrw-lang/isc-financial-snapshots/main/snapshots/${SNAPSHOT_DATE}.csv"
          wc -l snapshot.csv
          head -4 snapshot.csv

      - name: Run backtest pipeline
        env:
          TIINGO_TOKEN: ${{ secrets.TIINGO_TOKEN }}
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then
            echo "Running full backtest (no limit)"
            python backtest_pipeline.py --snapshot snapshot.csv
          else
            echo "Running with limit=$LIMIT"
            python backtest_pipeline.py --snapshot snapshot.csv --limit "$LIMIT"
          fi

      - name: Show results summary
        run: |
          echo "=== backtest_results.csv ==="
          wc -l backtest_results.csv
          echo ""
          echo "=== First 3 rows ==="
          head -4 backtest_results.csv

      - name: Run analyzer
        run: |
          python backtest_analyze.py
          echo ""
          echo "=== backtest_summary.txt ==="
          cat backtest_summary.txt
          echo ""
          echo "=== backtest_per_stock.csv (head) ==="
          head -5 backtest_per_stock.csv
          echo ""
          echo "=== backtest_narratives.txt (head) ==="
          head -60 backtest_narratives.txt

      - name: Upload all backtest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backtest-output
          path: |
            backtest_results.csv
            backtest_summary.txt
            backtest_regime_tables.txt
            backtest_per_stock.csv
            backtest_narratives.txt
          retention-days: 30
